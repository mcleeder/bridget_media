# Minimal MPD config for Pi Media — streaming only, output to a Bluetooth
# speaker through bluez-alsa. Installed to /etc/mpd.conf by setup_pi.sh.
#
# @SPEAKER_MAC@ is replaced by configure_speaker (see setup_pi.sh output)
# once the speaker has been paired with bluetoothctl.

music_directory     "/var/lib/mpd/music"
playlist_directory  "/var/lib/mpd/playlists"
db_file             "/var/lib/mpd/tag_cache"
state_file          "/var/lib/mpd/state"
sticker_file        "/var/lib/mpd/sticker.sql"
log_file            "syslog"

user                "mpd"
bind_to_address     "localhost"
port                "6600"

# Streaming URLs only — nothing local to scan.
auto_update         "no"

audio_output {
    type        "alsa"
    name        "Bluetooth speaker"
    device      "bluealsa:DEV=@SPEAKER_MAC@,PROFILE=a2dp"
    mixer_type  "software"
}

# Wired headphone jack, mirrored alongside the Bluetooth output. Card-by-name
# (not index) so it survives reboots where card enumeration order shifts.
audio_output {
    type        "alsa"
    name        "Aux output"
    device      "plughw:CARD=Headphones"
    mixer_type  "software"
}

# Let ffmpeg decode mp3 streams. The default mp3 decoder (mad) cannot seek
# in ad-stitched streams (e.g. WNYC/Radiolab) — "Decoder failed to seek" on
# every ±30s skip — while ffmpeg seeks them fine. mpg123 is disabled too so
# it never shadows ffmpeg for local mp3 (it can't decode streams at all).
decoder {
    plugin "mad"
    enabled "no"
}

decoder {
    plugin "mpg123"
    enabled "no"
}
